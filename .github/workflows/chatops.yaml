name: ChatOps
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.pull_request
      && (github.event.comment.author_association == 'OWNER'
        || github.event.comment.author_association == 'MEMBER'
        || github.event.comment.author_association == 'COLLABORATOR')
      && (startsWith(github.event.comment.body, '/format')
        || startsWith(github.event.comment.body, '/test')
        || startsWith(github.event.comment.body, '/bench')
        || startsWith(github.event.comment.body, '/diff')
        || startsWith(github.event.comment.body, '/profile')) }}
    steps:
      - name: Extract command
        id: command
        run: |
          CMD=$(echo "${{ github.event.comment.body }}" | awk '{print $1}')
          echo "command=$CMD" >> $GITHUB_OUTPUT

      - name: Get PR Info
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const request = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            }
            core.info(`Getting PR #${request.pull_number} from ${request.owner}/${request.repo}`)
            try {
              const result = await github.rest.pulls.get(request)
              return result.data
            } catch (err) {
              core.setFailed(`Request failed with error ${err}`)
            }

      - name: Checkout PR Branch
        uses: actions/checkout@v5
        with:
          repository: ${{ fromJSON(steps.pr-info.outputs.result).head.repo.full_name }}
          ref: ${{ fromJSON(steps.pr-info.outputs.result).head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Go version
        id: go-version
        run: echo "go-version=$(grep -o 'go [0-9]\+\.[0-9]\+' go.mod | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go-version.outputs.go-version }}

      - name: Process /format
        if: steps.command.outputs.command == '/format'
        run: |
          make clean
          make init
          go install github.com/segmentio/golines@latest
          go install mvdan.cc/gofumpt@latest
          go install github.com/localz/strictgoimports@latest
          go install golang.org/x/tools/cmd/goimports@latest
          export GOPATH=$(go env GOPATH)
          export PATH=$PATH:$GOPATH/bin
          make format

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: format code from chatops" || echo "No changes to commit"

      - name: Push /format
        if: steps.command.outputs.command == '/format'
        run: |
          git push origin HEAD:${{ fromJSON(steps.pr-info.outputs.result).head.ref }}

      - name: Process /test
        if: steps.command.outputs.command == '/test'
        run: |
          make test > test_output.txt 2>&1 || true

          cat << 'COMMENTEOF' > comment.txt
          ### Test Results
          ```
          COMMENTEOF
          cat test_output.txt >> comment.txt
          echo '```' >> comment.txt

      - name: Process /bench
        if: steps.command.outputs.command == '/bench'
        run: |
          make bench > bench_output.txt 2>&1 || true

          cat << 'COMMENTEOF' > comment.txt
          ### Benchmark Results
          ```
          COMMENTEOF
          cat bench_output.txt >> comment.txt
          echo '```' >> comment.txt

      - name: Process /diff
        if: steps.command.outputs.command == '/diff'
        run: |
          # Fetch main branch so git worktree can use it as base branch
          git fetch origin main:main

          # make bench-compare uses BASE_BRANCH which defaults to main
          make bench-compare || true

          cat << 'COMMENTEOF' > comment.txt
          ### Benchmark Comparison (vs main)
          ```text
          COMMENTEOF

          # Ensure bench_results exist to avoid cat failing
          if [ -d bench_results ] && ls bench_results/benchstat-main-* >/dev/null 2>&1; then
             cat bench_results/benchstat-main-* >> comment.txt
          else
             echo "Failed to generate benchstat output. Check GitHub Actions logs for details." >> comment.txt
          fi

          echo '```' >> comment.txt

      - name: Process /profile
        if: steps.command.outputs.command == '/profile'
        run: |
          sudo apt-get update && sudo apt-get install -y graphviz

          make profile > profile_output.txt 2>&1 || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -d bench ] && compgen -G 'bench/*.svg' > /dev/null; then
            git add -f bench/*.svg
          else
            echo "No SVG profile files generated; skipping git add"
          fi
          git commit -m "chore: add profile svgs from chatops" || echo "No changes to commit"

          COMMIT_SHA=$(git rev-parse HEAD)
          REPO="${{ fromJSON(steps.pr-info.outputs.result).head.repo.full_name }}"

          cat << COMMENTEOF > comment.txt
          ### Profile Results

          **CPU Profile:**
          https://raw.githubusercontent.com/$REPO/$COMMIT_SHA/bench/cpu-gache.svg

          **Memory Profile:**
          https://raw.githubusercontent.com/$REPO/$COMMIT_SHA/bench/mem-gache.svg

          **Output:**
          \`\`\`
          COMMENTEOF
          cat profile_output.txt >> comment.txt
          echo '```' >> comment.txt

      - name: Push /profile
        if: steps.command.outputs.command == '/profile'
        run: |
          git push origin HEAD:${{ fromJSON(steps.pr-info.outputs.result).head.ref }}

      - name: Post Comment
        if: steps.command.outputs.command == '/test' || steps.command.outputs.command == '/bench' || steps.command.outputs.command == '/profile' || steps.command.outputs.command == '/diff'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const commentBody = fs.readFileSync('comment.txt', 'utf8')

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            })
